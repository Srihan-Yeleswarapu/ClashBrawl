name: iOS Build

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

# Restrict permissions for security
permissions:
  contents: read

jobs:
  build:
    name: Build
    runs-on: macos-latest

    steps:
      - name: Checkout
        uses: actions/checkout@692231e42914ac536f5f6c4a4e9fa0edc028f5d2 # v4.1.6

      - name: Select Xcode version
        uses: maxim-lobanov/setup-xcode@7f5bc5ee44f1c541b1c4a1facc6b6fe8a7e45dc4 # v1.6.0
        with:
          xcode-version: latest-stable

      - name: Show Xcode version
        run: xcodebuild -version

      - name: Install XcodeGen
        run: brew install xcodegen

      - name: Generate Xcode Project
        working-directory: ClashBrawl
        run: xcodegen generate

      - name: Build Xcode project
        working-directory: ClashBrawl
        run: |
          xcodebuild clean build \
            -project ClashBrawl.xcodeproj \
            -scheme ClashBrawl \
            -destination 'platform=iOS Simulator,name=iPhone 15' \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            ENTITLEMENTS_REQUIRED=NO
