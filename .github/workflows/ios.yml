name: iOS Build

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

# Restrict permissions for security
permissions:
  contents: read

jobs:
  build:
    name: Build
    runs-on: macos-26

    steps:
      - name: Checkout
        uses: actions/checkout@692231e42914ac536f5f6c4a4e9fa0edc028f5d2 # v4.1.6

      - name: Select Xcode version
        # Prefer Xcode 26.6 (matches project.yml `xcodeVersion: "26.6"`),
        # falling back gracefully to any Xcode 26.x point release.
        run: |
          XCODE_PATH=$(ls -d /Applications/Xcode_26.6*.app 2>/dev/null | sort -V | tail -1)
          if [ -z "$XCODE_PATH" ]; then
            XCODE_PATH=$(ls -d /Applications/Xcode_26.*.app 2>/dev/null | sort -V | tail -1)
          fi
          if [ -z "$XCODE_PATH" ]; then
            echo "[ERROR] No Xcode 26.x installed on this runner."
            ls -d /Applications/Xcode_* 2>/dev/null
            exit 1
          fi
          echo "Selecting: $XCODE_PATH"
          sudo xcode-select -s "$XCODE_PATH/Contents/Developer"
          xcodebuild -version

      - name: Download iOS Platform
        run: sudo xcodebuild -downloadPlatform iOS

      - name: Install XcodeGen
        run: brew install xcodegen

      - name: Generate Xcode Project
        working-directory: ClashBrawl
        run: xcodegen generate

      - name: Build Xcode project
        working-directory: ClashBrawl
        run: |
          xcodebuild clean build \
            -project ClashBrawl.xcodeproj \
            -scheme ClashBrawl \
            -destination 'platform=iOS Simulator,name=iPhone 15' \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            ENTITLEMENTS_REQUIRED=NO
