name: ClashBrawl

options:
  bundleIdPrefix: com.clashbrawl
  xcodeVersion: "26.6"
  deploymentTarget:
    iOS: "17.0"
  createIntermediateGroups: true
  groupSortPosition: top

settings:
  base:
    SWIFT_VERSION: "5.9"
    MARKETING_VERSION: "1.0"
    CURRENT_PROJECT_VERSION: "1"
    ENABLE_BITCODE: NO

targets:
  ClashBrawl:
    type: application
    platform: iOS
    deploymentTarget: "17.0"

    sources:
      - path: ClashBrawl/ClashBrawl

    resources:
      - path: ClashBrawl/Resources/Assets.xcassets

    info:
      properties:
        CFBundleVersion: "$(CURRENT_PROJECT_VERSION)"
        CFBundleShortVersionString: "$(MARKETING_VERSION)"
        CFBundleName: ClashBrawl
        CFBundleDisplayName: ClashBrawl
        CFBundleIdentifier: "$(PRODUCT_BUNDLE_IDENTIFIER)"
        ITSAppUsesNonExemptEncryption: false
        UILaunchScreen:
          UIColorName: LaunchBackground
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
          - UIInterfaceOrientationLandscapeLeft
          - UIInterfaceOrientationLandscapeRight

    settings:
      base:
        MARKETING_VERSION: "1.0"
        CURRENT_PROJECT_VERSION: "1"
        PRODUCT_BUNDLE_IDENTIFIER: com.clashbrawl.ClashBrawl
        CODE_SIGN_IDENTITY: ""
        CODE_SIGNING_REQUIRED: NO
        CODE_SIGNING_ALLOWED: NO
        TARGETED_DEVICE_FAMILY: "1,2"
        LD_RUNPATH_SEARCH_PATHS: "$(inherited) @executable_path/Frameworks"
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon

schemes:
  ClashBrawl:
    build:
      targets:
        ClashBrawl: all
    run:
      config: Debug
    archive:
      config: Release
