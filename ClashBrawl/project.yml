name: ClashBrawl
options:
  bundleIdPrefix: com.clashbrawl
  deploymentTarget:
    iOS: "17.0"
  createIntermediateGroups: true
targets:
  ClashBrawl:
    type: application
    platform: iOS
    sources:
      - path: ClashBrawl
    settings:
      GENERATE_INFOPLIST_FILE: YES
      CURRENT_PROJECT_VERSION: 1
      MARKETING_VERSION: 1.0
      PRODUCT_BUNDLE_IDENTIFIER: com.clashbrawl.ClashBrawl
      SWIFT_VERSION: "5.9"
      TARGETED_DEVICE_FAMILY: "1,2"
      SUPPORTS_MACCATALYST: NO
      CODE_SIGN_IDENTITY: ""
      CODE_SIGNING_REQUIRED: NO
      CODE_SIGNING_ALLOWED: NO
